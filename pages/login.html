<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MockTest Pro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="../index.html">MockTest Pro</a></div>
        <div class="nav-links" id="navLinks">
            <a href="../index.html">Home</a>
            <a href="signup.html" class="btn-primary">Sign Up</a>
        </div>
        <button class="mobile-toggle" id="mobileToggle">&#9776;</button>
    </nav>

    <main class="container">
        <div class="auth-container">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <div id="authError" style="color: #ef4444; margin-bottom: 1rem; display: none; font-size: 0.875rem; text-align: center;"></div>
                
                <button type="submit" class="btn-submit" id="loginBtn">Login</button>
                <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                    Don't have an account? <a href="signup.html" style="color: var(--primary-color);">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script type="module" src="../js/firebase-auth.js"></script>
</body>
</html>
