<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testeract - Quizzes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <h1>Testeract</h1>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Explore Quizzes</h2>
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search quizzes by title..." 
                    autocomplete="off"
                >
            </div>
        </section>

        <section class="content">
            <div id="loadingIndicator">Loading quizzes...</div>
            <div id="emptyState" style="display: none;">No quizzes found.</div>
            
            <div id="quizGrid" class="quiz-grid">
                </div>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
